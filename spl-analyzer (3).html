<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SPL Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

:root {
  --bg: #080b0d;
  --panel: #0e1318;
  --panel2: #131920;
  --border: #1a2530;
  --green: #00e5a0;
  --green-glow: rgba(0,229,160,0.12);
  --amber: #f5a623;
  --red: #ff4b4b;
  --blue: #4ab3ff;
  --text: #b8ccd6;
  --text-dim: #4a6070;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Barlow Condensed', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { height: 100%; }

body {
  /* Use JS-measured height via --vh custom property */
  height: calc(var(--vh, 1vh) * 100);
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  touch-action: manipulation;
  position: fixed;
  width: 100%;
  top: 0; left: 0;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

/* ── Header: very compact ── */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 12px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  height: 40px;
}
.logo {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--green);
  letter-spacing: 2px;
  text-shadow: 0 0 12px rgba(0,229,160,0.5);
}
.status-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 9px;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 5px var(--red);
  animation: blink 1s ease-in-out infinite;
}
.dot.active { background: var(--green); box-shadow: 0 0 5px var(--green); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-text { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }

/* ── SPL strip: compact ── */
.spl-strip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 4px 12px;
  height: 52px;
}
.spl-main { flex: 1; display: flex; align-items: baseline; gap: 6px; }
.spl-val {
  font-family: var(--mono);
  font-size: 38px;
  color: var(--green);
  text-shadow: 0 0 20px rgba(0,229,160,0.5);
  line-height: 1;
  min-width: 3.5ch;
}
.spl-meta { display: flex; flex-direction: column; gap: 1px; }
.spl-unit { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
.spl-mode { font-family: var(--mono); font-size: 10px; color: var(--amber); }
.meter-wrap {
  width: 8px; height: 42px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  margin-left: 8px;
}
.meter-fill {
  width: 100%; height: 0%;
  background: linear-gradient(0deg, var(--green) 0%, var(--green) 60%, var(--amber) 80%, var(--red) 100%);
  transition: height 0.08s linear;
}

/* ── RC row: compact, scrollable ── */
.rc-row {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  height: 36px;
}
.rc-row::-webkit-scrollbar { display: none; }
.rc-label-txt { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; white-space: nowrap; flex-shrink: 0; }
.rc-btn {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  border-radius: 3px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  -webkit-appearance: none;
  height: 24px;
}
.rc-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(245,166,35,0.1); }
.rc-btn.none-btn.active { border-color: var(--text-dim); color: var(--text-dim); background: rgba(90,112,128,0.08); }

/* ── Chart: takes all remaining space ── */
.chart-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--panel2);
  min-height: 0;
}
canvas#chart { position: absolute; inset: 0; width: 100%; height: 100%; }

/* ── Bottom controls ── */
.bottom-area {
  flex-shrink: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
}
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  height: 34px;
}
.tab-btn {
  flex: 1;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1px;
  text-align: center;
  color: var(--text-dim);
  background: transparent;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

.tab-content { padding: 8px 12px 10px; display: none; }
.tab-content.active { display: block; }

/* Measure tab */
.mode-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 7px;
}
.mode-btn {
  font-family: var(--mono);
  font-size: 11px;
  padding: 7px 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 3px;
  text-align: center;
  -webkit-appearance: none;
}
.mode-btn small { display: block; font-size: 8px; opacity: 0.5; margin-top: 1px; }
.mode-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(245,166,35,0.08); }

.avg-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}
.avg-row label { font-size: 10px; color: var(--text-dim); white-space: nowrap; }
.avg-row input[type=range] { flex: 1; accent-color: var(--amber); height: 18px; }
.avg-val { font-family: var(--mono); font-size: 12px; color: var(--amber); min-width: 28px; text-align: right; }

.big-btn {
  width: 100%;
  padding: 9px 0;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 3px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid var(--green);
  color: var(--green);
  background: transparent;
  -webkit-appearance: none;
}
.big-btn.running { border-color: var(--red); color: var(--red); }

/* Calibrate tab */
.cal-row { display: flex; gap: 6px; margin-bottom: 7px; align-items: center; }
.cal-row label { font-size: 10px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }
.inp-text {
  flex: 1; min-width: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 8px;
  font-family: var(--mono);
  font-size: 11px;
  border-radius: 3px;
  outline: none;
  -webkit-appearance: none;
}
.inp-num {
  width: 64px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--green);
  padding: 6px 6px;
  font-family: var(--mono);
  font-size: 13px;
  border-radius: 3px;
  outline: none;
  text-align: center;
  -webkit-appearance: none;
}
.unit-lbl { font-size: 10px; color: var(--text-dim); }
.btn-row { display: flex; gap: 6px; }
.smol-btn {
  flex: 1;
  padding: 7px 4px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid;
  background: transparent;
  text-align: center;
  -webkit-appearance: none;
}
.smol-green { border-color: var(--green); color: var(--green); }
.smol-red   { border-color: var(--red);   color: var(--red);   }

/* Profiles tab */
.profile-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 100px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.pitem {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
}
.pitem.active { border-color: var(--green); background: var(--green-glow); }
.pname { flex: 1; font-family: var(--mono); font-size: 11px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.poffset { font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
.pdel { background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
.no-profiles { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-align: center; padding: 12px 0; }

/* Toast */
.toast {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--panel2);
  border: 1px solid var(--green);
  color: var(--green);
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 16px;
  border-radius: 3px;
  letter-spacing: 1px;
  transition: transform 0.3s ease;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Overlay */
.overlay {
  position: fixed; inset: 0;
  background: rgba(8,11,13,0.97);
  display: flex; align-items: center; justify-content: center;
  z-index: 500;
  padding: 24px;
}
.overlay-box {
  background: var(--panel2);
  border: 1px solid var(--border);
  padding: 28px 22px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  border-radius: 4px;
}
.overlay-title { font-family: var(--mono); font-size: 15px; color: var(--green); letter-spacing: 3px; margin-bottom: 10px; }
.overlay-text { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 20px; }
</style>
</head>
<body>
<div id="app">

  <header>
    <span class="logo">SPL ANALYZER</span>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="statusTxt">STANDBY</span>
    </div>
  </header>

  <div class="spl-strip">
    <div class="spl-main">
      <div class="spl-val" id="splVal">---</div>
      <div class="spl-meta">
        <span class="spl-unit">dB LIN</span>
        <span class="spl-mode" id="splMode">SLOW</span>
      </div>
    </div>
    <div class="meter-wrap">
      <div class="meter-fill" id="meterFill"></div>
    </div>
  </div>

  <div class="rc-row">
    <span class="rc-label-txt">RC:</span>
    <button class="rc-btn none-btn active" data-rc="none">OFF</button>
    <button class="rc-btn" data-rc="15">RC-15</button>
    <button class="rc-btn" data-rc="20">RC-20</button>
    <button class="rc-btn" data-rc="25">RC-25</button>
    <button class="rc-btn" data-rc="30">RC-30</button>
    <button class="rc-btn" data-rc="35">RC-35</button>
    <button class="rc-btn" data-rc="40">RC-40</button>
    <button class="rc-btn" data-rc="45">RC-45</button>
    <button class="rc-btn" data-rc="50">RC-50</button>
  </div>

  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>

  <div class="bottom-area">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="measure">MEASURE</button>
      <button class="tab-btn" data-tab="calibrate">CALIBRATE</button>
      <button class="tab-btn" data-tab="profiles">PROFILES</button>
    </div>

    <div class="tab-content active" id="tab-measure">
      <div class="mode-grid">
        <button class="mode-btn" data-mode="fast">FAST<small>125ms</small></button>
        <button class="mode-btn active" data-mode="slow">SLOW<small>1 sec</small></button>
        <button class="mode-btn" data-mode="avg">AVG<small>custom</small></button>
      </div>
      <div class="avg-row" id="avgRow" style="display:none;">
        <label>Duration:</label>
        <input type="range" id="avgSlider" min="2" max="120" value="10" step="1">
        <span class="avg-val" id="avgValTxt">10s</span>
      </div>
      <button class="big-btn" id="startBtn">&#9654; START</button>
    </div>

    <div class="tab-content" id="tab-calibrate">
      <div class="cal-row">
        <label>Device:</label>
        <input type="text" class="inp-text" id="calName" placeholder="e.g. Pixel 8 Pro">
      </div>
      <div class="cal-row">
        <label>Offset:</label>
        <input type="number" class="inp-num" id="calOff" value="0" step="0.5" min="-40" max="40">
        <span class="unit-lbl">dB</span>
      </div>
      <div class="btn-row">
        <button class="smol-btn smol-green" id="saveBtn">SAVE</button>
        <button class="smol-btn smol-red" id="clearBtn">CLEAR</button>
      </div>
    </div>

    <div class="tab-content" id="tab-profiles">
      <div class="profile-list" id="profileList">
        <div class="no-profiles">No saved profiles</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-title">MIC ACCESS</div>
    <div class="overlay-text">Microphone access is required to measure sound levels. No audio is stored or transmitted.</div>
    <button class="big-btn" id="reqMicBtn">REQUEST ACCESS</button>
  </div>
</div>

<script>
// ── Fix for Android Chrome's dynamic viewport height ──────────────────────
function setVH() {
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', vh + 'px');
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', () => setTimeout(setVH, 200));

// ── 1/3 Octave Band Centre Frequencies (ISO 266) ──────────────────────────
const BANDS = [
  25, 31.5, 40, 50, 63, 80, 100, 125, 160,
  200, 250, 315, 400, 500, 630, 800, 1000,
  1250, 1600, 2000, 2500, 3150, 4000, 5000, 6300, 8000
];
const BAND_LABELS = [
  '25','31.5','40','50','63','80','100','125','160',
  '200','250','315','400','500','630','800','1k',
  '1.25k','1.6k','2k','2.5k','3.15k','4k','5k','6.3k','8k'
];

// ── RC Curves (ASHRAE RC Mark II) ─────────────────────────────────────────
const RC_OCT_CENTRES = [16, 31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000];
const RC_OCT_DATA = {
  15: [56,44,34,25,19,15,13,11,10, 9],
  20: [60,48,38,29,23,20,17,14,13,12],
  25: [64,52,43,33,27,25,22,19,17,16],
  30: [67,57,47,38,31,30,27,24,21,20],
  35: [71,61,52,43,36,35,32,29,26,25],
  40: [75,65,56,47,41,40,36,33,30,29],
  45: [79,69,61,52,46,45,41,38,34,33],
  50: [83,73,65,56,51,50,45,41,38,37],
};

function interpRC(key) {
  const vals = RC_OCT_DATA[key];
  return BANDS.map(f => {
    if (f <= RC_OCT_CENTRES[0]) return vals[0];
    if (f >= RC_OCT_CENTRES[RC_OCT_CENTRES.length-1]) return vals[vals.length-1];
    for (let i = 0; i < RC_OCT_CENTRES.length-1; i++) {
      if (f >= RC_OCT_CENTRES[i] && f <= RC_OCT_CENTRES[i+1]) {
        const t = (Math.log(f) - Math.log(RC_OCT_CENTRES[i])) /
                  (Math.log(RC_OCT_CENTRES[i+1]) - Math.log(RC_OCT_CENTRES[i]));
        return vals[i] + t*(vals[i+1]-vals[i]);
      }
    }
    return vals[vals.length-1];
  });
}
const RC_INTERP = {};
Object.keys(RC_OCT_DATA).forEach(k => { RC_INTERP[k] = interpRC(parseInt(k)); });

// ── State ─────────────────────────────────────────────────────────────────
let audioCtx=null, analyser=null, micStream=null, raf=null;
let isRunning=false, avgMode='slow', avgDurSec=10, calOffset=0;
let activeProfile=null, selectedRC='none';
let bandSmooth = new Array(BANDS.length).fill(0);
let bandAvgBufs = BANDS.map(()=>[]);
let avgStartTime=null, lastT=null;
const FAST_TC=0.125, SLOW_TC=1.0;

// ── DOM ───────────────────────────────────────────────────────────────────
const canvas    = document.getElementById('chart');
const ctx2d     = canvas.getContext('2d');
const splValEl  = document.getElementById('splVal');
const splModeEl = document.getElementById('splMode');
const meterEl   = document.getElementById('meterFill');
const startBtn  = document.getElementById('startBtn');
const dot       = document.getElementById('dot');
const statusTxt = document.getElementById('statusTxt');
const toastEl   = document.getElementById('toast');
const overlay   = document.getElementById('overlay');
const avgRow    = document.getElementById('avgRow');
const avgSlider = document.getElementById('avgSlider');
const avgValTxt = document.getElementById('avgValTxt');

// ── Tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

// ── Averaging mode ────────────────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    avgMode = btn.dataset.mode;
    avgRow.style.display = avgMode==='avg' ? 'flex' : 'none';
    splModeEl.textContent = avgMode==='avg' ? 'AVG '+avgDurSec+'s' : avgMode.toUpperCase();
    bandAvgBufs = BANDS.map(()=>[]); avgStartTime=null;
  });
});
avgSlider.addEventListener('input', () => {
  avgDurSec = parseInt(avgSlider.value);
  avgValTxt.textContent = avgDurSec+'s';
  splModeEl.textContent = 'AVG '+avgDurSec+'s';
  bandAvgBufs = BANDS.map(()=>[]); avgStartTime=null;
});

// ── RC buttons ────────────────────────────────────────────────────────────
document.querySelectorAll('.rc-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rc-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedRC = btn.dataset.rc;
    drawChart(bandSmooth);
  });
});

// ── Start / Stop ──────────────────────────────────────────────────────────
startBtn.addEventListener('click', () => isRunning ? stopAnalysis() : startAnalysis());

async function startAnalysis() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    micStream = stream;
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 32768;
    analyser.smoothingTimeConstant = 0;
    src.connect(analyser);
    isRunning=true;
    startBtn.textContent='■ STOP';
    startBtn.classList.add('running');
    dot.classList.add('active');
    statusTxt.textContent='ACTIVE';
    bandSmooth=new Array(BANDS.length).fill(0);
    bandAvgBufs=BANDS.map(()=>[]);
    avgStartTime=performance.now(); lastT=null;
    loop();
  } catch(e) {
    showToast('Microphone access denied');
    overlay.style.display='flex';
  }
}

function stopAnalysis() {
  isRunning=false;
  if(raf) cancelAnimationFrame(raf);
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  if(audioCtx) audioCtx.close();
  audioCtx=analyser=micStream=null;
  startBtn.textContent='▶ START';
  startBtn.classList.remove('running');
  dot.classList.remove('active');
  statusTxt.textContent='STANDBY';
}

// ── DSP ───────────────────────────────────────────────────────────────────
function getBandLevels() {
  const N=analyser.frequencyBinCount;
  const fft=new Float32Array(N);
  analyser.getFloatFrequencyData(fft);
  const sr=audioCtx.sampleRate;
  const binHz=sr/(N*2);
  const THIRD=Math.pow(2,1/6);
  return BANDS.map(fc=>{
    const fLow=fc/THIRD, fHigh=fc*THIRD;
    const bLow=Math.max(0,Math.floor(fLow/binHz));
    const bHigh=Math.min(N-1,Math.ceil(fHigh/binHz));
    let pwr=0,cnt=0;
    for(let i=bLow;i<=bHigh;i++){
      const d=fft[i];
      if(d>-200){pwr+=Math.pow(10,d/10);cnt++;}
    }
    return cnt ? 10*Math.log10(Math.max(pwr,1e-20)) : -90;
  });
}

// ── Main loop ─────────────────────────────────────────────────────────────
function loop() {
  if(!isRunning) return;
  raf=requestAnimationFrame(loop);
  if(!analyser) return;
  const now=performance.now();
  const dt=lastT?(now-lastT)/1000:0.016; lastT=now;
  const raw=getBandLevels();
  const cal=raw.map(v=>v+calOffset);
  let disp;
  if(avgMode==='fast'||avgMode==='slow'){
    const tc=avgMode==='fast'?FAST_TC:SLOW_TC;
    const alpha=1-Math.exp(-dt/tc);
    bandSmooth=bandSmooth.map((s,i)=>{
      const lN=Math.pow(10,cal[i]/10), lO=Math.pow(10,s/10);
      return 10*Math.log10(Math.max(lO+alpha*(lN-lO),1e-20));
    });
    disp=bandSmooth;
  } else {
    cal.forEach((v,i)=>bandAvgBufs[i].push(Math.pow(10,v/10)));
    disp=bandAvgBufs.map(buf=>10*Math.log10(Math.max(buf.reduce((a,b)=>a+b,0)/buf.length,1e-20)));
    if((now-avgStartTime)/1000>=avgDurSec){bandAvgBufs=BANDS.map(()=>[]);avgStartTime=now;}
    bandSmooth=disp;
  }
  const tot=disp.reduce((s,v)=>s+Math.pow(10,v/10),0);
  const totDB=10*Math.log10(Math.max(tot,1e-20));
  splValEl.textContent=totDB.toFixed(1);
  meterEl.style.height=Math.min(100,Math.max(0,(totDB+30)/110*100))+'%';
  drawChart(disp);
}

// ── Chart ─────────────────────────────────────────────────────────────────
function drawChart(levels) {
  const wrap=canvas.parentElement;
  const W=wrap.clientWidth, H=wrap.clientHeight;
  if(!W||!H) return;
  canvas.width=W; canvas.height=H;
  const c=ctx2d;
  const NB=BANDS.length;
  const DB_MAX=90, DB_MIN=10;
  const narrow=W<380;
  const PAD={l:narrow?24:32, r:6, t:10, b:narrow?26:32};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;
  const dbY=db=>PAD.t+cH*(1-(db-DB_MIN)/(DB_MAX-DB_MIN));
  const bX=i=>PAD.l+(i+0.5)*(cW/NB);

  c.fillStyle='#131920'; c.fillRect(0,0,W,H);

  // Grid
  const step=narrow?20:10;
  c.font=`${narrow?7:8}px 'Share Tech Mono',monospace`;
  c.textAlign='right';
  for(let db=DB_MIN;db<=DB_MAX;db+=step){
    const y=dbY(db);
    c.strokeStyle='#1a2530'; c.lineWidth=1;
    c.beginPath(); c.moveTo(PAD.l,y); c.lineTo(PAD.l+cW,y); c.stroke();
    c.fillStyle='#3a5060'; c.fillText(db,PAD.l-2,y+3);
  }
  for(let i=0;i<=NB;i++){
    const x=PAD.l+i*(cW/NB);
    c.strokeStyle='#161d24'; c.lineWidth=1;
    c.beginPath(); c.moveTo(x,PAD.t); c.lineTo(x,PAD.t+cH); c.stroke();
  }

  // RC curve
  if(selectedRC!=='none'&&RC_INTERP[selectedRC]){
    const curve=RC_INTERP[selectedRC];
    c.beginPath();
    curve.forEach((v,i)=>{ const x=bX(i),y=dbY(Math.min(DB_MAX,Math.max(v,DB_MIN))); i===0?c.moveTo(x,y):c.lineTo(x,y); });
    c.lineTo(bX(NB-1)+cW/NB/2,PAD.t); c.lineTo(PAD.l,PAD.t); c.closePath();
    c.fillStyle='rgba(245,166,35,0.05)'; c.fill();
    c.beginPath();
    c.strokeStyle='rgba(245,166,35,0.8)'; c.lineWidth=1.5; c.setLineDash([4,3]);
    curve.forEach((v,i)=>{ const x=bX(i),y=dbY(Math.min(DB_MAX,Math.max(v,DB_MIN))); i===0?c.moveTo(x,y):c.lineTo(x,y); });
    c.stroke(); c.setLineDash([]);
    const ly=dbY(Math.min(DB_MAX,Math.max(curve[NB-1],DB_MIN)));
    c.fillStyle='rgba(245,166,35,0.9)'; c.font=`bold 8px 'Share Tech Mono',monospace`;
    c.textAlign='left'; c.fillText('RC-'+selectedRC,bX(NB-1)+3,ly+4);
  }

  // Bars
  const barW=Math.max(2,(cW/NB)*0.72);
  if(levels&&levels.length===NB){
    levels.forEach((db,i)=>{
      const cdb=Math.min(DB_MAX,Math.max(db,DB_MIN));
      const x=bX(i)-barW/2, yTop=dbY(cdb), yBot=dbY(DB_MIN), h=Math.max(0,yBot-yTop);
      let col='#00e5a0';
      if(selectedRC!=='none'&&RC_INTERP[selectedRC]){
        const rcV=RC_INTERP[selectedRC][i];
        if(db>rcV+5) col='#ff4b4b';
        else if(db>rcV) col='#f5a623';
      }
      const g=c.createLinearGradient(0,yTop,0,yBot);
      g.addColorStop(0,col); g.addColorStop(1,'rgba(0,0,0,0)');
      c.fillStyle=g; c.fillRect(x,yTop,barW,h);
      c.fillStyle=col; c.globalAlpha=0.82; c.fillRect(x,yTop+2,barW,Math.max(0,h-2)); c.globalAlpha=1;
      c.shadowColor=col; c.shadowBlur=7; c.fillStyle=col; c.fillRect(x,yTop,barW,2); c.shadowBlur=0;
    });
    // Value labels
    levels.forEach((db,i)=>{
      const yTop=dbY(Math.min(DB_MAX,Math.max(db,DB_MIN))), yBot=dbY(DB_MIN);
      if((yBot-yTop)>13&&db>DB_MIN+3){
        c.fillStyle='rgba(255,255,255,0.7)';
        c.font=`${narrow?6:7}px 'Share Tech Mono',monospace`;
        c.textAlign='center'; c.fillText(Math.round(db),bX(i),yTop-2);
      }
    });
  }

  // X labels
  c.fillStyle='#3a5570'; c.textAlign='center';
  c.font=`${narrow?6:7}px 'Share Tech Mono',monospace`;
  BAND_LABELS.forEach((lbl,i)=>{
    if(narrow&&i%2!==0) return;
    c.fillText(lbl,bX(i),PAD.t+cH+(narrow?10:13));
  });

  c.strokeStyle='#1a2530'; c.lineWidth=1;
  c.strokeRect(PAD.l,PAD.t,cW,cH);
}

// ── Calibration ───────────────────────────────────────────────────────────
document.getElementById('calOff').addEventListener('input', e=>{ calOffset=parseFloat(e.target.value)||0; });
document.getElementById('saveBtn').addEventListener('click', ()=>{
  const name=document.getElementById('calName').value.trim();
  if(!name){showToast('Enter a device name');return;}
  const off=parseFloat(document.getElementById('calOff').value)||0;
  const profiles=loadProfiles();
  const idx=profiles.findIndex(p=>p.name===name);
  const entry={name,offset:off};
  if(idx>=0) profiles[idx]=entry; else profiles.push(entry);
  saveProfiles(profiles); activeProfile=name; calOffset=off;
  renderProfiles(); showToast('Saved: '+name);
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  document.getElementById('calName').value='';
  document.getElementById('calOff').value='0';
  calOffset=0; activeProfile=null;
  renderProfiles(); showToast('Cleared');
});

function loadProfiles(){ try{return JSON.parse(localStorage.getItem('spl_profiles')||'[]');}catch(e){return[];} }
function saveProfiles(p){ localStorage.setItem('spl_profiles',JSON.stringify(p)); }

function renderProfiles(){
  const list=document.getElementById('profileList');
  const profiles=loadProfiles();
  if(!profiles.length){list.innerHTML='<div class="no-profiles">No saved profiles</div>';return;}
  list.innerHTML='';
  profiles.forEach(p=>{
    const el=document.createElement('div');
    el.className='pitem'+(p.name===activeProfile?' active':'');
    el.innerHTML=`<span class="pname">${p.name}</span><span class="poffset">${p.offset>=0?'+':''}${p.offset}dB</span><button class="pdel">✕</button>`;
    el.querySelector('.pname').addEventListener('click',()=>applyProfile(p));
    el.querySelector('.poffset').addEventListener('click',()=>applyProfile(p));
    el.querySelector('.pdel').addEventListener('click',e=>{e.stopPropagation();delProfile(p.name);});
    list.appendChild(el);
  });
}
function applyProfile(p){
  document.getElementById('calName').value=p.name;
  document.getElementById('calOff').value=p.offset;
  calOffset=p.offset; activeProfile=p.name;
  renderProfiles(); showToast('Loaded: '+p.name);
}
function delProfile(name){
  let profiles=loadProfiles().filter(p=>p.name!==name);
  saveProfiles(profiles);
  if(activeProfile===name){activeProfile=null;document.getElementById('calName').value='';document.getElementById('calOff').value='0';calOffset=0;}
  renderProfiles();
}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2500);
}

// ── Mic overlay ───────────────────────────────────────────────────────────
document.getElementById('reqMicBtn').addEventListener('click', async()=>{
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    s.getTracks().forEach(t=>t.stop());
    overlay.style.display='none'; showToast('Mic access granted');
  }catch(e){showToast('Mic access denied');}
});
navigator.permissions&&navigator.permissions.query({name:'microphone'}).then(r=>{
  if(r.state==='granted') overlay.style.display='none';
}).catch(()=>{});

// ── Boot ──────────────────────────────────────────────────────────────────
renderProfiles();
drawChart(null);
window.addEventListener('resize',()=>{ setVH(); drawChart(bandSmooth); });
</script>
