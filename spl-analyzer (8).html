<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SPL Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');
:root {
  --bg:#080b0d; --panel:#0e1318; --panel2:#131920; --border:#1a2530;
  --green:#00e5a0; --green-glow:rgba(0,229,160,0.12);
  --amber:#f5a623; --red:#ff4b4b; --blue:#4ab3ff; --purple:#c084fc;
  --text:#b8ccd6; --text-dim:#4a6070;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  height:calc(var(--vh,1vh)*100);
  overflow:hidden;background:var(--bg);color:var(--text);
  font-family:var(--sans);touch-action:manipulation;
  position:fixed;width:100%;top:0;left:0;
}
#app{display:flex;flex-direction:column;height:100%;width:100%;}
header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--panel);border-bottom:1px solid var(--border);height:38px;}
.logo{font-family:var(--mono);font-size:13px;color:var(--green);letter-spacing:2px;text-shadow:0 0 12px rgba(0,229,160,0.5);}
.status-pill{display:flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 5px var(--red);animation:blink 1s ease-in-out infinite;}
.dot.active{background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.status-text{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1px;}
.spl-strip{flex-shrink:0;display:flex;align-items:center;background:var(--panel);border-bottom:1px solid var(--border);padding:4px 12px;height:54px;gap:0;}
.spl-block{display:flex;align-items:baseline;gap:5px;flex:1;}
.spl-block+.spl-block{border-left:1px solid var(--border);padding-left:12px;margin-left:4px;}
.spl-val{font-family:var(--mono);font-size:34px;line-height:1;min-width:3.3ch;}
.spl-val.lin{color:var(--green);text-shadow:0 0 18px rgba(0,229,160,0.5);}
.spl-val.dba{color:var(--blue);text-shadow:0 0 18px rgba(74,179,255,0.5);}
.spl-meta{display:flex;flex-direction:column;gap:1px;}
.spl-unit{font-size:9px;color:var(--text-dim);letter-spacing:1px;}
.spl-mode{font-family:var(--mono);font-size:9px;color:var(--amber);}
.meter-wrap{width:8px;height:44px;background:var(--panel2);border:1px solid var(--border);border-radius:3px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;margin-left:8px;flex-shrink:0;}
.meter-fill{width:100%;height:0%;background:linear-gradient(0deg,var(--green) 0%,var(--green) 60%,var(--amber) 80%,var(--red) 100%);transition:height 0.08s linear;}
.ctrl-row{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;height:36px;}
.ctrl-row::-webkit-scrollbar{display:none;}
.row-label{font-size:9px;color:var(--text-dim);letter-spacing:2px;white-space:nowrap;flex-shrink:0;}
.divider{width:1px;height:18px;background:var(--border);flex-shrink:0;margin:0 3px;}
.pill-btn{font-family:var(--mono);font-size:10px;padding:3px 8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:3px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;height:24px;transition:all 0.15s;}
.pill-btn.act-amber{border-color:var(--amber);color:var(--amber);background:rgba(245,166,35,0.1);}
.pill-btn.act-purple{border-color:var(--purple);color:var(--purple);background:rgba(192,132,252,0.1);}
.pill-btn.act-green{border-color:var(--green);color:var(--green);background:var(--green-glow);}
.pill-btn.act-dim{border-color:var(--text-dim);color:var(--text-dim);background:rgba(90,112,128,0.08);}
.chart-wrap{flex:1;position:relative;overflow:hidden;background:var(--panel2);min-height:0;}
canvas#chart{position:absolute;inset:0;width:100%;height:100%;}
.bottom-area{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);}
.tab-bar{display:flex;border-bottom:1px solid var(--border);height:32px;}
.tab-btn{flex:1;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-align:center;color:var(--text-dim);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);}
.tab-content{padding:8px 12px 10px;display:none;}
.tab-content.active{display:block;}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:7px;}
.mode-btn{font-family:var(--mono);font-size:11px;padding:7px 4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;border-radius:3px;text-align:center;-webkit-appearance:none;}
.mode-btn small{display:block;font-size:8px;opacity:0.5;margin-top:1px;}
.mode-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(245,166,35,0.08);}
.avg-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.avg-row label{font-size:10px;color:var(--text-dim);white-space:nowrap;}
.avg-row input[type=range]{flex:1;accent-color:var(--amber);height:18px;}
.avg-val{font-family:var(--mono);font-size:12px;color:var(--amber);min-width:28px;text-align:right;}
.big-btn{width:100%;padding:9px 0;font-family:var(--mono);font-size:12px;letter-spacing:3px;border-radius:3px;cursor:pointer;border:1px solid var(--green);color:var(--green);background:transparent;-webkit-appearance:none;}
.big-btn.running{border-color:var(--red);color:var(--red);}
.cal-row{display:flex;gap:6px;margin-bottom:7px;align-items:center;}
.cal-row label{font-size:10px;color:var(--text-dim);white-space:nowrap;flex-shrink:0;}
.inp-text{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;font-family:var(--mono);font-size:11px;border-radius:3px;outline:none;-webkit-appearance:none;}
.inp-num{width:64px;background:var(--bg);border:1px solid var(--border);color:var(--green);padding:6px;font-family:var(--mono);font-size:13px;border-radius:3px;outline:none;text-align:center;-webkit-appearance:none;}
.unit-lbl{font-size:10px;color:var(--text-dim);}
.btn-row{display:flex;gap:6px;}
.smol-btn{flex:1;padding:7px 4px;font-family:var(--mono);font-size:10px;letter-spacing:1px;border-radius:3px;cursor:pointer;border:1px solid;background:transparent;text-align:center;-webkit-appearance:none;}
.smol-green{border-color:var(--green);color:var(--green);}
.smol-red{border-color:var(--red);color:var(--red);}
.profile-list{display:flex;flex-direction:column;gap:4px;max-height:100px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pitem{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:3px;cursor:pointer;}
.pitem.active{border-color:var(--green);background:var(--green-glow);}
.pname{flex:1;font-family:var(--mono);font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.poffset{font-family:var(--mono);font-size:10px;color:var(--text-dim);flex-shrink:0;}
.pdel{background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0;}
.no-profiles{font-family:var(--mono);font-size:10px;color:var(--text-dim);text-align:center;padding:12px 0;}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--panel2);border:1px solid var(--green);color:var(--green);font-family:var(--mono);font-size:11px;padding:8px 16px;border-radius:3px;letter-spacing:1px;transition:transform 0.3s ease;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.overlay{position:fixed;inset:0;background:rgba(8,11,13,0.97);display:flex;align-items:center;justify-content:center;z-index:500;padding:24px;}
.overlay-box{background:var(--panel2);border:1px solid var(--border);padding:28px 22px;max-width:360px;width:100%;text-align:center;border-radius:4px;}
.overlay-title{font-family:var(--mono);font-size:15px;color:var(--green);letter-spacing:3px;margin-bottom:10px;}
.overlay-text{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:20px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">SPL ANALYZER</span>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="statusTxt">STANDBY</span>
    </div>
  </header>

  <div class="spl-strip">
    <div class="spl-block">
      <div class="spl-val lin" id="splLin">---</div>
      <div class="spl-meta">
        <span class="spl-unit">dB LIN</span>
        <span class="spl-mode" id="splMode">SLOW</span>
      </div>
    </div>
    <div class="spl-block">
      <div class="spl-val dba" id="splDba">---</div>
      <div class="spl-meta">
        <span class="spl-unit">dB(A)</span>
        <span class="spl-mode" id="ncReadout" style="color:var(--purple)">NC —</span>
      </div>
    </div>
    <div class="meter-wrap"><div class="meter-fill" id="meterFill"></div></div>
  </div>

  <div class="ctrl-row">
    <span class="row-label">CRITERIA:</span>
    <button class="pill-btn act-dim" data-crit="none">OFF</button>
    <button class="pill-btn" data-crit="rc15">RC-15</button>
    <button class="pill-btn" data-crit="rc20">RC-20</button>
    <button class="pill-btn" data-crit="rc25">RC-25</button>
    <button class="pill-btn" data-crit="rc30">RC-30</button>
    <button class="pill-btn" data-crit="rc35">RC-35</button>
    <button class="pill-btn" data-crit="rc40">RC-40</button>
    <button class="pill-btn" data-crit="rc45">RC-45</button>
    <button class="pill-btn" data-crit="rc50">RC-50</button>
    <div class="divider"></div>
    <button class="pill-btn" data-crit="nc15">NC-15</button>
    <button class="pill-btn" data-crit="nc20">NC-20</button>
    <button class="pill-btn" data-crit="nc25">NC-25</button>
    <button class="pill-btn" data-crit="nc30">NC-30</button>
    <button class="pill-btn" data-crit="nc35">NC-35</button>
    <button class="pill-btn" data-crit="nc40">NC-40</button>
    <button class="pill-btn" data-crit="nc45">NC-45</button>
    <button class="pill-btn" data-crit="nc50">NC-50</button>
    <div class="divider"></div>
    <span class="row-label">BANDS:</span>
    <button class="pill-btn act-green" id="bandToggle">1/3 OCT</button>
  </div>

  <div class="chart-wrap"><canvas id="chart"></canvas></div>

  <div class="bottom-area">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="measure">MEASURE</button>
      <button class="tab-btn" data-tab="calibrate">CALIBRATE</button>
      <button class="tab-btn" data-tab="profiles">PROFILES</button>
    </div>
    <div class="tab-content active" id="tab-measure">
      <div class="mode-grid">
        <button class="mode-btn" data-mode="fast">FAST<small>125ms</small></button>
        <button class="mode-btn active" data-mode="slow">SLOW<small>1 sec</small></button>
        <button class="mode-btn" data-mode="avg">AVG<small>custom</small></button>
      </div>
      <div class="avg-row" id="avgRow" style="display:none;">
        <label>Duration:</label>
        <input type="range" id="avgSlider" min="2" max="120" value="10" step="1">
        <span class="avg-val" id="avgValTxt">10s</span>
      </div>
      <button class="big-btn" id="startBtn">&#9654; START</button>
    </div>
    <div class="tab-content" id="tab-calibrate">
      <div class="cal-row">
        <label>Device:</label>
        <input type="text" class="inp-text" id="calName" placeholder="e.g. Pixel 8 Pro">
      </div>
      <div class="cal-row">
        <label>Offset:</label>
        <input type="number" class="inp-num" id="calOff" value="0" step="0.5" min="-40" max="40">
        <span class="unit-lbl">dB</span>
      </div>
      <div class="btn-row">
        <button class="smol-btn smol-green" id="saveBtn">SAVE</button>
        <button class="smol-btn smol-red" id="clearBtn">CLEAR</button>
      </div>
    </div>
    <div class="tab-content" id="tab-profiles">
      <div class="profile-list" id="profileList">
        <div class="no-profiles">No saved profiles</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-title">MIC ACCESS</div>
    <div class="overlay-text">Microphone access is required to measure sound levels. No audio is stored or transmitted.</div>
    <button class="big-btn" id="reqMicBtn">REQUEST ACCESS</button>
  </div>
</div>

<script>
// ── Viewport height fix ───────────────────────────────────────────────────
function setVH(){document.documentElement.style.setProperty('--vh',window.innerHeight*0.01+'px');}
setVH();
window.addEventListener('resize',()=>{setVH();drawChart(currentLevels);});
window.addEventListener('orientationchange',()=>setTimeout(()=>{setVH();drawChart(currentLevels);},200));

// ── 1/3 Octave bands (ISO 266) ────────────────────────────────────────────
const BANDS_THIRD = [25,31.5,40,50,63,80,100,125,160,200,250,315,400,500,630,800,1000,1250,1600,2000,2500,3150,4000,5000,6300,8000];
const LABELS_THIRD = ['25','31.5','40','50','63','80','100','125','160','200','250','315','400','500','630','800','1k','1.25k','1.6k','2k','2.5k','3.15k','4k','5k','6.3k','8k'];

// ── Full octave bands ─────────────────────────────────────────────────────
const BANDS_OCT = [31.5,63,125,250,500,1000,2000,4000,8000];
const LABELS_OCT = ['31.5','63','125','250','500','1k','2k','4k','8k'];

// ── A-weighting (IEC 61672-1) at each 1/3-oct centre ─────────────────────
const A_WEIGHT_THIRD = [-44.7,-39.4,-34.6,-30.2,-26.2,-22.5,-19.1,-16.1,-13.4,-10.9,-8.6,-6.6,-4.8,-3.2,-1.9,-0.8,0.0,0.6,1.0,1.2,1.3,1.2,1.0,0.5,-0.1,-1.1];
const A_WEIGHT_OCT   = [-39.4,-26.2,-16.1,-8.6,-3.2,0.0,1.2,1.0,-1.1];

// ── RC curves – octave bands 31.5–4k Hz (from reference table) ───────────
const RC_FREQS = [31.5,63,125,250,500,1000,2000,4000];
const RC_DATA = {
  15:[55,39,30,25,20,15,10, 5],
  20:[56,42,35,30,25,20,15,10],
  25:[58,45,40,35,30,25,20,15],
  30:[59,50,45,40,35,30,25,20],
  35:[60,55,50,45,40,35,30,25],
  40:[65,60,55,50,45,40,35,30],
  45:[70,65,60,55,50,45,40,35],
  50:[75,70,65,60,55,50,45,40],
};

// ── NC curves (Beranek) – octave bands 63–8k Hz ───────────────────────────
const NC_FREQS = [63,125,250,500,1000,2000,4000,8000];
const NC_DATA = {
  15:[47,36,29,22,17,14,12,11],
  20:[51,40,33,26,22,19,17,16],
  25:[54,44,37,31,27,24,22,21],
  30:[57,48,41,35,31,29,28,27],
  35:[60,52,45,40,36,34,33,32],
  40:[64,57,50,45,41,39,38,37],
  45:[67,60,54,49,46,44,43,42],
  50:[71,64,58,54,51,49,48,47],
};

// ── NC single-number rating ───────────────────────────────────────────────
// Takes octave-band levels at BANDS_OCT (31.5,63,125,250,500,1k,2k,4k,8k)
// NC uses 63–8k (indices 1–8)
function calcNC(octLevels) {
  const v = octLevels.slice(1); // 63–8k
  const keys = [15,20,25,30,35,40,45,50];
  for (let k=keys.length-1; k>=0; k--) {
    const curve = NC_DATA[keys[k]];
    if (v.some((db,j) => db > curve[j]+0.5)) {
      return k < keys.length-1 ? keys[k+1] : '>50';
    }
  }
  return '<15';
}

// ── State ─────────────────────────────────────────────────────────────────
let audioCtx=null, analyser=null, micStream=null, raf=null;
let isRunning=false, avgMode='slow', avgDurSec=10, calOffset=0;
let activeProfile=null, selectedCrit='none', bandMode='third';
let currentBands=BANDS_THIRD, currentAW=A_WEIGHT_THIRD;
let bandSmooth=[], bandAvgBufs=[], avgStartTime=null, lastT=null;
let currentLevels=null;
const FAST_TC=0.125, SLOW_TC=1.0;

function resetBuffers(){
  bandSmooth=new Array(currentBands.length).fill(0);
  bandAvgBufs=currentBands.map(()=>[]);
  avgStartTime=performance.now();
}

// ── DOM refs ──────────────────────────────────────────────────────────────
const canvas    = document.getElementById('chart');
const ctx2d     = canvas.getContext('2d');
const splLinEl  = document.getElementById('splLin');
const splDbaEl  = document.getElementById('splDba');
const splModeEl = document.getElementById('splMode');
const ncEl      = document.getElementById('ncReadout');
const meterEl   = document.getElementById('meterFill');
const startBtn  = document.getElementById('startBtn');
const dot       = document.getElementById('dot');
const statusTxt = document.getElementById('statusTxt');
const toastEl   = document.getElementById('toast');
const overlay   = document.getElementById('overlay');
const avgRow    = document.getElementById('avgRow');
const avgSlider = document.getElementById('avgSlider');
const avgValTxt = document.getElementById('avgValTxt');
const bandToggle= document.getElementById('bandToggle');

// ── Tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

// ── Criteria selector ─────────────────────────────────────────────────────
document.querySelectorAll('[data-crit]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-crit]').forEach(b=>b.classList.remove('act-amber','act-purple','act-dim'));
    selectedCrit=btn.dataset.crit;
    if(selectedCrit==='none') btn.classList.add('act-dim');
    else if(selectedCrit.startsWith('rc')) btn.classList.add('act-amber');
    else btn.classList.add('act-purple');
    drawChart(currentLevels);
  });
});

// ── Band mode toggle ──────────────────────────────────────────────────────
bandToggle.addEventListener('click',()=>{
  bandMode = bandMode==='third'?'oct':'third';
  bandToggle.textContent = bandMode==='third'?'1/3 OCT':'1 OCT';
  currentBands = bandMode==='third'?BANDS_THIRD:BANDS_OCT;
  currentAW    = bandMode==='third'?A_WEIGHT_THIRD:A_WEIGHT_OCT;
  currentLevels=null; resetBuffers(); drawChart(null);
});

// ── Averaging mode ────────────────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    avgMode=btn.dataset.mode;
    avgRow.style.display=avgMode==='avg'?'flex':'none';
    splModeEl.textContent=avgMode==='avg'?'AVG '+avgDurSec+'s':avgMode.toUpperCase();
    resetBuffers();
  });
});
avgSlider.addEventListener('input',()=>{
  avgDurSec=parseInt(avgSlider.value);
  avgValTxt.textContent=avgDurSec+'s';
  splModeEl.textContent='AVG '+avgDurSec+'s';
  resetBuffers();
});

// ── Start / Stop ──────────────────────────────────────────────────────────
startBtn.addEventListener('click',()=>isRunning?stopAnalysis():startAnalysis());

async function startAnalysis(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
    });
    micStream=stream;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=32768;
    analyser.smoothingTimeConstant=0;
    src.connect(analyser);
    isRunning=true;
    startBtn.textContent='■ STOP';
    startBtn.classList.add('running');
    dot.classList.add('active');
    statusTxt.textContent='ACTIVE';
    currentBands=bandMode==='third'?BANDS_THIRD:BANDS_OCT;
    currentAW=bandMode==='third'?A_WEIGHT_THIRD:A_WEIGHT_OCT;
    resetBuffers(); lastT=null;
    loop();
  }catch(e){
    showToast('Microphone access denied');
    overlay.style.display='flex';
  }
}

function stopAnalysis(){
  isRunning=false;
  if(raf)cancelAnimationFrame(raf);
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  if(audioCtx)audioCtx.close();
  audioCtx=analyser=micStream=null;
  startBtn.textContent='▶ START';
  startBtn.classList.remove('running');
  dot.classList.remove('active');
  statusTxt.textContent='STANDBY';
}

// ── DSP ───────────────────────────────────────────────────────────────────
function getBandLevels(){
  const N=analyser.frequencyBinCount;
  const fft=new Float32Array(N);
  analyser.getFloatFrequencyData(fft);
  const sr=audioCtx.sampleRate;
  const binHz=sr/(N*2);
  const HALF=bandMode==='third'?Math.pow(2,1/6):Math.SQRT2;
  return currentBands.map(fc=>{
    const fLow=fc/HALF,fHigh=fc*HALF;
    const bLow=Math.max(0,Math.floor(fLow/binHz));
    const bHigh=Math.min(N-1,Math.ceil(fHigh/binHz));
    let pwr=0,cnt=0;
    for(let i=bLow;i<=bHigh;i++){const d=fft[i];if(d>-200){pwr+=Math.pow(10,d/10);cnt++;}}
    return cnt?10*Math.log10(Math.max(pwr,1e-20)):-90;
  });
}

// ── Main loop ─────────────────────────────────────────────────────────────
function loop(){
  if(!isRunning)return;
  raf=requestAnimationFrame(loop);
  if(!analyser)return;
  const now=performance.now();
  const dt=lastT?(now-lastT)/1000:0.016; lastT=now;
  const raw=getBandLevels();
  const cal=raw.map(v=>v+calOffset);
  let disp;

  if(avgMode==='fast'||avgMode==='slow'){
    const tc=avgMode==='fast'?FAST_TC:SLOW_TC;
    const alpha=1-Math.exp(-dt/tc);
    bandSmooth=bandSmooth.map((s,i)=>{
      const lN=Math.pow(10,cal[i]/10),lO=Math.pow(10,s/10);
      return 10*Math.log10(Math.max(lO+alpha*(lN-lO),1e-20));
    });
    disp=bandSmooth;
  }else{
    cal.forEach((v,i)=>bandAvgBufs[i].push(Math.pow(10,v/10)));
    disp=bandAvgBufs.map(buf=>10*Math.log10(Math.max(buf.reduce((a,b)=>a+b,0)/buf.length,1e-20)));
    if((now-avgStartTime)/1000>=avgDurSec)resetBuffers();
    bandSmooth=disp;
  }
  currentLevels=disp;

  // Lin SPL
  const totLin=disp.reduce((s,v)=>s+Math.pow(10,v/10),0);
  const linDB=10*Math.log10(Math.max(totLin,1e-20));
  splLinEl.textContent=linDB.toFixed(1);
  meterEl.style.height=Math.min(100,Math.max(0,(linDB+30)/110*100))+'%';

  // dB(A)
  const totA=disp.reduce((s,v,i)=>s+Math.pow(10,(v+currentAW[i])/10),0);
  splDbaEl.textContent=(10*Math.log10(Math.max(totA,1e-20))).toFixed(1);

  // NC rating – always needs octave band levels
  let octLev;
  if(bandMode==='oct'){
    octLev=disp;
  }else{
    octLev=BANDS_OCT.map(fc=>{
      const fLow=fc/Math.SQRT2,fHigh=fc*Math.SQRT2;
      let pwr=0;
      BANDS_THIRD.forEach((bf,bi)=>{if(bf>=fLow&&bf<=fHigh)pwr+=Math.pow(10,disp[bi]/10);});
      return 10*Math.log10(Math.max(pwr,1e-20));
    });
  }
  ncEl.textContent='NC '+calcNC(octLev);
  splModeEl.textContent=avgMode==='avg'?'AVG '+avgDurSec+'s':avgMode.toUpperCase();
  drawChart(disp);
}

// ── Chart ─────────────────────────────────────────────────────────────────
function drawChart(levels){
  const wrap=canvas.parentElement;
  const W=wrap.clientWidth, H=wrap.clientHeight;
  if(!W||!H)return;
  canvas.width=W; canvas.height=H;
  const c=ctx2d;

  const DB_MAX=90, DB_MIN=10;
  const narrow=W<380;
  const PAD={l:narrow?24:32, r:10, t:10, b:narrow?26:32};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;

  // All x-positioning uses a true log-frequency scale
  const fMin=currentBands[0], fMax=currentBands[currentBands.length-1];
  const freqX = f => PAD.l + Math.log(f/fMin)/Math.log(fMax/fMin)*cW;
  const dbY   = db => PAD.t + cH*(1-(db-DB_MIN)/(DB_MAX-DB_MIN));

  c.fillStyle='#131920'; c.fillRect(0,0,W,H);

  // Horizontal dB grid
  const step=narrow?20:10;
  c.font=`${narrow?7:8}px 'Share Tech Mono',monospace`; c.textAlign='right';
  for(let db=DB_MIN;db<=DB_MAX;db+=step){
    const y=dbY(db);
    c.strokeStyle='#1a2530'; c.lineWidth=1;
    c.beginPath(); c.moveTo(PAD.l,y); c.lineTo(PAD.l+cW,y); c.stroke();
    c.fillStyle='#3a5060'; c.fillText(db,PAD.l-2,y+3);
  }

  // Vertical grid at each band frequency
  currentBands.forEach(f=>{
    const x=freqX(f);
    c.strokeStyle='#161d24'; c.lineWidth=1;
    c.beginPath(); c.moveTo(x,PAD.t); c.lineTo(x,PAD.t+cH); c.stroke();
  });

  // ── RC / NC curve – raw octave points, straight lines between them ──────
  if(selectedCrit!=='none'){
    const isRC = selectedCrit.startsWith('rc');
    const key  = parseInt(selectedCrit.slice(2));
    const cFreqs = isRC ? RC_FREQS : NC_FREQS;
    const cVals  = isRC ? RC_DATA[key] : NC_DATA[key];
    const lineCol= isRC ? 'rgba(245,166,35,0.9)' : 'rgba(192,132,252,0.9)';
    const fillCol= isRC ? 'rgba(245,166,35,0.07)' : 'rgba(192,132,252,0.07)';

    if(cFreqs && cVals){
      // Clip to displayed range
      const pts=[];
      for(let i=0;i<cFreqs.length;i++){
        if(cFreqs[i]>=fMin*0.9 && cFreqs[i]<=fMax*1.1) pts.push({f:cFreqs[i],db:cVals[i]});
      }

      if(pts.length>=2){
        // Shade above curve
        c.beginPath();
        pts.forEach((p,i)=>{
          const x=freqX(p.f), y=dbY(Math.min(DB_MAX,Math.max(p.db,DB_MIN)));
          i===0?c.moveTo(x,y):c.lineTo(x,y);
        });
        c.lineTo(freqX(pts[pts.length-1].f),PAD.t);
        c.lineTo(freqX(pts[0].f),PAD.t);
        c.closePath();
        c.fillStyle=fillCol; c.fill();

        // Line
        c.beginPath();
        c.strokeStyle=lineCol; c.lineWidth=2; c.setLineDash([5,3]);
        pts.forEach((p,i)=>{
          const x=freqX(p.f), y=dbY(Math.min(DB_MAX,Math.max(p.db,DB_MIN)));
          i===0?c.moveTo(x,y):c.lineTo(x,y);
        });
        c.stroke(); c.setLineDash([]);

        // Dots at each octave anchor
        c.fillStyle=lineCol;
        pts.forEach(p=>{
          const x=freqX(p.f), y=dbY(Math.min(DB_MAX,Math.max(p.db,DB_MIN)));
          c.beginPath(); c.arc(x,y,3,0,Math.PI*2); c.fill();
        });

        // Label
        const last=pts[pts.length-1];
        c.fillStyle=lineCol;
        c.font=`bold 9px 'Share Tech Mono',monospace`;
        c.textAlign='right';
        const lx=freqX(last.f), ly=dbY(Math.min(DB_MAX,Math.max(last.db,DB_MIN)));
        c.fillText(selectedCrit.toUpperCase().replace('RC','RC-').replace('NC','NC-'),lx-5,ly-6);
      }
    }
  }

  // ── Bars ──────────────────────────────────────────────────────────────
  // Bar width proportional to log-frequency spacing
  if(levels&&levels.length===currentBands.length){
    currentBands.forEach((fc,i)=>{
      const db=levels[i];
      const cdb=Math.min(DB_MAX,Math.max(db,DB_MIN));
      const cx=freqX(fc);
      // width = half the log-distance to neighbours
      const fL=i>0?Math.sqrt(currentBands[i-1]*fc):fc/Math.pow(2,0.5*(bandMode==='third'?1/3:1));
      const fR=i<currentBands.length-1?Math.sqrt(currentBands[i+1]*fc):fc*Math.pow(2,0.5*(bandMode==='third'?1/3:1));
      const x0=freqX(fL), x1=freqX(fR);
      const bw=Math.max(2,(x1-x0)*0.78);
      const yTop=dbY(cdb), yBot=dbY(DB_MIN), h=Math.max(0,yBot-yTop);

      // Colour vs criterion
      let col='#00e5a0';
      if(selectedCrit!=='none'){
        const isRC=selectedCrit.startsWith('rc');
        const key=parseInt(selectedCrit.slice(2));
        const cFreqs=isRC?RC_FREQS:NC_FREQS;
        const cVals=isRC?RC_DATA[key]:NC_DATA[key];
        if(cFreqs&&cVals){
          // find nearest octave anchor
          let bestDist=Infinity, criterionDb=null;
          for(let j=0;j<cFreqs.length;j++){
            const d=Math.abs(Math.log(cFreqs[j]/fc));
            if(d<bestDist){bestDist=d;criterionDb=cVals[j];}
          }
          if(criterionDb!==null){
            if(db>criterionDb+5) col='#ff4b4b';
            else if(db>criterionDb) col='#f5a623';
          }
        }
      }

      const g=c.createLinearGradient(0,yTop,0,yBot);
      g.addColorStop(0,col); g.addColorStop(1,'rgba(0,0,0,0)');
      c.fillStyle=g; c.fillRect(cx-bw/2,yTop,bw,h);
      c.fillStyle=col; c.globalAlpha=0.82; c.fillRect(cx-bw/2,yTop+2,bw,Math.max(0,h-2)); c.globalAlpha=1;
      c.shadowColor=col; c.shadowBlur=7;
      c.fillStyle=col; c.fillRect(cx-bw/2,yTop,bw,2);
      c.shadowBlur=0;

      // Value label on taller bars
      if(h>14&&db>DB_MIN+3){
        c.fillStyle='rgba(255,255,255,0.7)';
        c.font=`${narrow?6:7}px 'Share Tech Mono',monospace`;
        c.textAlign='center'; c.fillText(Math.round(db),cx,yTop-2);
      }
    });
  }

  // X-axis frequency labels
  const labels=bandMode==='third'?LABELS_THIRD:LABELS_OCT;
  c.fillStyle='#3a5570'; c.textAlign='center';
  c.font=`${narrow?6:7}px 'Share Tech Mono',monospace`;
  currentBands.forEach((f,i)=>{
    if(narrow&&bandMode==='third'&&i%2!==0)return;
    c.fillText(labels[i],freqX(f),PAD.t+cH+(narrow?10:13));
  });

  // Border
  c.strokeStyle='#1a2530'; c.lineWidth=1;
  c.strokeRect(PAD.l,PAD.t,cW,cH);
}

// ── Calibration ───────────────────────────────────────────────────────────
document.getElementById('calOff').addEventListener('input',e=>{calOffset=parseFloat(e.target.value)||0;});
document.getElementById('saveBtn').addEventListener('click',()=>{
  const name=document.getElementById('calName').value.trim();
  if(!name){showToast('Enter a device name');return;}
  const off=parseFloat(document.getElementById('calOff').value)||0;
  const profiles=loadProfiles();
  const idx=profiles.findIndex(p=>p.name===name);
  if(idx>=0)profiles[idx]={name,offset:off};else profiles.push({name,offset:off});
  saveProfiles(profiles);activeProfile=name;calOffset=off;renderProfiles();showToast('Saved: '+name);
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  document.getElementById('calName').value='';document.getElementById('calOff').value='0';
  calOffset=0;activeProfile=null;renderProfiles();showToast('Cleared');
});
function loadProfiles(){try{return JSON.parse(localStorage.getItem('spl_profiles')||'[]');}catch(e){return[];}}
function saveProfiles(p){localStorage.setItem('spl_profiles',JSON.stringify(p));}
function renderProfiles(){
  const list=document.getElementById('profileList');
  const profiles=loadProfiles();
  if(!profiles.length){list.innerHTML='<div class="no-profiles">No saved profiles</div>';return;}
  list.innerHTML='';
  profiles.forEach(p=>{
    const el=document.createElement('div');
    el.className='pitem'+(p.name===activeProfile?' active':'');
    el.innerHTML=`<span class="pname">${p.name}</span><span class="poffset">${p.offset>=0?'+':''}${p.offset}dB</span><button class="pdel">✕</button>`;
    el.querySelector('.pname').addEventListener('click',()=>applyProfile(p));
    el.querySelector('.poffset').addEventListener('click',()=>applyProfile(p));
    el.querySelector('.pdel').addEventListener('click',e=>{e.stopPropagation();delProfile(p.name);});
    list.appendChild(el);
  });
}
function applyProfile(p){
  document.getElementById('calName').value=p.name;document.getElementById('calOff').value=p.offset;
  calOffset=p.offset;activeProfile=p.name;renderProfiles();showToast('Loaded: '+p.name);
}
function delProfile(name){
  let profiles=loadProfiles().filter(p=>p.name!==name);saveProfiles(profiles);
  if(activeProfile===name){activeProfile=null;document.getElementById('calName').value='';document.getElementById('calOff').value='0';calOffset=0;}
  renderProfiles();
}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  toastEl.textContent=msg;toastEl.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2500);
}

// ── Mic overlay ───────────────────────────────────────────────────────────
document.getElementById('reqMicBtn').addEventListener('click',async()=>{
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    s.getTracks().forEach(t=>t.stop());
    overlay.style.display='none';showToast('Mic access granted');
  }catch(e){showToast('Mic access denied');}
});
navigator.permissions&&navigator.permissions.query({name:'microphone'}).then(r=>{
  if(r.state==='granted')overlay.style.display='none';
}).catch(()=>{});

// ── Boot ──────────────────────────────────────────────────────────────────
currentBands=BANDS_THIRD; currentAW=A_WEIGHT_THIRD;
resetBuffers(); renderProfiles(); drawChart(null);
</script>
